<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourabh TQM site</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>

    <!-- Start Button Container -->
    <div class="start_btn activeStart">
        <button id="start-btn">Launch Quiz</button>
    </div>

    <!-- Info Box -->
    <div class="info_box" id="info-box">
        <div class="info-title">Quiz Instructions</div>
        <div class="info-list">
            <div class="info">Duration: <span>15 seconds</span> per question.</div>
            <div class="info">Integrity: <span>Locked navigation</span> during play.</div>
            <div class="info">Scoring: <span>Accuracy-based</span> point system.</div>
            <div class="info">Selection: Choices are <span>final</span> once clicked.</div>
            <div class="info">Outcome: Detailed <span>performance analysis</span>.</div>
        </div>
        <div class="buttons">
            <button class="quit" id="info-quit">Discard</button>
            <button class="restart" id="info-continue">Initialize</button>
        </div>
    </div>

    <!-- Quiz Box -->
    <div class="quiz_box" id="quiz-box">
        <header>
            <div class="title">Sourabh TQM site</div>
            <div class="timer">
                <div class="time_left_txt">Remaining</div>
                <div class="timer_sec" id="timer-sec">15</div>
            </div>
            <div class="time_line" id="time-line"></div>
        </header>
        <section>
            <div class="que_text" id="que-text">
                <!-- Question injected via JS -->
            </div>
            <div class="option_list" id="option-list">
                <!-- Options injected via JS -->
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <div class="total_que" id="total-que">
                <!-- Question Count injected via JS -->
            </div>
            <button class="next_btn" id="next-btn">Proceed</button>
        </footer>
    </div>

    <!-- Result Box -->
    <div class="result_box" id="result-box">
        <div class="icon">
            <i class="fas fa-trophy"></i>
        </div>
        <div class="complete_text">Assessment Finalized</div>
        <div class="score_text" id="score-text">
            <!-- Result injected via JS -->
        </div>
        <div class="buttons">
            <button class="restart" id="result-restart">Restart Session</button>
            <button class="quit" id="result-quit">Terminate</button>
        </div>
    </div>

    <!-- Questions Data -->
    <script src="js/questions.js"></script>

    <!-- Quiz Logic -->
    <script src="js/script.js"></script>

</body>

</html>
